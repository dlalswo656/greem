spring.application.name=greem

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/greem?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=0000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# 파일 업로드
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
file.upload-dir=src/main/resources/static/uploads

# JWT
jwt.secret=greem-secret-key-must-be-at-least-256-bits-long-for-hs256-security
jwt.expiration=86400000

# 서버 포트
server.port=8080
